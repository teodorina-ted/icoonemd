name = "effleure-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Deploy target ─────────────────────────────────────────────────────────────
# After `wrangler deploy` the worker is live at:
#   https://effleure-worker.<your-subdomain>.workers.dev
#
# Add a custom route in the Cloudflare dashboard:
#   Route: icoonemassagechisinau.com/api/*  → effleure-worker
# Then update WORKER_URL in LeadFormSection.tsx to:
#   https://icoonemassagechisinau.com/api

# ── D1 Database ───────────────────────────────────────────────────────────────
# Create with:  wrangler d1 create effleure_db
# Then copy the database_id below.
[[d1_databases]]
binding = "DB"
database_name = "effleure_db"
database_id   = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# ── KV Namespace ──────────────────────────────────────────────────────────────
# Create with:  wrangler kv:namespace create effleure_kv
# Then copy the id below.
[[kv_namespaces]]
binding = "KV"
id      = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# ── Cron Triggers ─────────────────────────────────────────────────────────────
# Runs refreshReviews() every 24 hours at midnight UTC.
[triggers]
crons = ["0 0 * * *"]

# ── Environment variables ─────────────────────────────────────────────────────
# Do NOT put secrets here.  Use:
#   wrangler secret put TO_EMAIL
#   wrangler secret put WA_TOKEN
#   etc.
#
# Non-secret vars can go here:
[vars]
FROM_NAME = "EFFLEURE Web"
FROM_EMAIL = "leads@icoonemassagechisinau.com"

# ── Production environment ────────────────────────────────────────────────────
[env.production]
name = "effleure-worker"
routes = [
  { pattern = "icoonemassagechisinau.com/api/*", zone_name = "icoonemassagechisinau.com" }
]
